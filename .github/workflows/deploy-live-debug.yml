name: Deploy live-debug to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "frontend/live-debug/**"
      - ".github/workflows/deploy-live-debug.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-live-debug
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/live-debug/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/live-debug

      - name: Build app for GitHub Pages
        run: npm run build -- --base "/${{ github.event.repository.name }}/"
        working-directory: frontend/live-debug

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/live-debug/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
