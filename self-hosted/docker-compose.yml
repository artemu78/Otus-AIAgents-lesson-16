# Simplified representation of Supabase self-hosting for the course
version: "3.8"
services:
  db:
    image: supabase/postgres:15.1.0.117
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  studio:
    image: supabase/studio:latest
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "3000:3000"
    depends_on:
      - db

  # Real Supabase stack requires GoTrue, Rest, Storage, etc.
  # For full setup: https://supabase.com/docs/guides/self-hosting/docker

volumes:
  db-data:
